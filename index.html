<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Drawing Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            background: #f0f0f0;
        }
        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        canvas {
            width: 80%;
            height: 400px;
            background: #fff;
            border: 1px solid #ddd;
            margin-top: 20px;
        }
        button, input[type="color"], input[type="range"] {
            margin-top: 10px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #ccc;
        }
        .player-list {
            margin-top: 10px;
            list-style-type: none;
            padding: 0;
        }
        .player-list li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="l">
            <h2>Loading your ID...</h2>
            <button id="s" disabled>Start</button>
        </div>

        <div id="g" style="display:none">
            <canvas id="c"></canvas>
            <input type="color" id="cp" value="#000">
            <input type="range" id="bs" min="1" max="10" value="5">
            <button id="cbtn">Clear</button>
            <input type="text" id="gi" placeholder="Guess what is drawn">
            <button id="gs">Submit Guess</button>
            <ul id="players" class="player-list"></ul>
            <h3 id="time-left">Time: 30</h3>
        </div>
    </div>

    <script src="https://cdn.peerjs.com/peerjs.min.js"></script>
    <script>
        let c = '#000', b = 5, s = 0, w = '', tl = 30, r = 1, mr = 3, lx, ly, wd = [];
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const startButton = document.getElementById('s'), gameContainer = document.getElementById('g'), startContainer = document.getElementById('l');
        const guessInput = document.getElementById('gi'), submitGuessButton = document.getElementById('gs');
        const playersList = document.getElementById('players'), timeLeft = document.getElementById('time-left');
        canvas.width = window.innerWidth * 0.8, canvas.height = 400;

        // Setup PeerJS - No server needed, it uses PeerJS Cloud Server
        const peer = new Peer(undefined, {
            host: 'peerjs.com', // Using PeerJS's cloud server
            port: 9000, // Default port for PeerJS
            path: '/peerjs',
            secure: true // Use secure connection (HTTPS)
        });

        let peerId = null;

        // When the peer is connected, display the player's ID and allow the game to start
        peer.on('open', id => {
            peerId = id;
            startButton.innerText = `Start as ${id}`;
            startButton.disabled = false;
            startButton.onclick = () => startGame(id);
        });

        // Setup peer connection and player list
        let peers = {}; // Keeps track of peer connections

        function startGame(username) {
            startContainer.style.display = 'none';
            gameContainer.style.display = 'block';

            // Request random words for the game
            fetch('https://random-word-api.herokuapp.com/word?number=10')
                .then(res => res.json())
                .then(data => { wd = data; nextRound(); });

            // Connect to any existing players automatically
            peer.listAllPeers(peersList => {
                peersList.forEach(id => {
                    if (id !== peerId) {
                        connectToPeer(id);
                    }
                });
            });
        }

        // Start the next round
        function nextRound() {
            if (r > mr) return endGame();
            w = wd[Math.floor(Math.random() * wd.length)];
            tl = 30;
            setTimeout(startTimer, 1000);
            updatePlayerList();
        }

        // Start the countdown timer
        function startTimer() {
            setInterval(() => {
                if (tl <= 0) nextRound();
                timeLeft.innerText = `Time: ${--tl}`;
            }, 1000);
        }

        // End the game and show the final score
        function endGame() {
            alert(`Game Over! Final Score: ${s}`);
            gameContainer.style.display = 'none';
            startContainer.style.display = 'block';
        }

        // Handle the guess submission
        submitGuessButton.onclick = () => {
            if (guessInput.value.trim().toLowerCase() === w) {
                s += 10;
                nextRound();
            } else {
                alert('Incorrect!');
            }
        };

        // Change drawing color
        document.getElementById('cp').oninput = e => c = e.target.value;

        // Change brush size
        document.getElementById('bs').oninput = e => b = e.target.value;

        // Clear the canvas
        document.getElementById('cbtn').onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Handle drawing on the canvas
        canvas.onmousedown = e => { lx = e.offsetX; ly = e.offsetY; };
        canvas.onmousemove = e => {
            if (lx !== undefined && ly !== undefined) {
                ctx.beginPath();
                ctx.moveTo(lx, ly);
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.strokeStyle = c;
                ctx.lineWidth = b;
                ctx.stroke();
                lx = e.offsetX;
                ly = e.offsetY;
            }
        };

        // Function to connect to another peer
        function connectToPeer(id) {
            const conn = peer.connect(id);
            conn.on('open', () => {
                console.log(`Connected to peer ${id}`);
                conn.send('hello');
            });
        }

        // Update player list on the screen
        function updatePlayerList() {
            peersList.forEach(id => {
                let playerItem = document.createElement('li');
                playerItem.innerText = `Player: ${id}`;
                playersList.appendChild(playerItem);
            });
        }

        // Fetch IP and start button logic
        fetchIP();

        async function fetchIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                startButton.innerText = `Start as ${data.ip}`;
                startButton.disabled = false;
                startButton.onclick = () => startGame(data.ip);
            } catch (err) {
                alert('Error fetching IP');
            }
        }
    </script>
</body>
</html>
