<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            background: #f0f0f0;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        canvas {
            width: 80%;
            height: 400px;
            background: #fff;
            border: 1px solid #ddd;
            margin-top: 20px;
        }
        button, input[type="color"], input[type="range"] {
            margin-top: 10px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="l">
            <h2>Loading your IP...</h2>
            <button id="s" disabled>Start</button>
        </div>

        <div id="g" style="display:none">
            <canvas id="c"></canvas>
            <input type="color" id="cp" value="#000">
            <input type="range" id="bs" min="1" max="10" value="5">
            <button id="cbtn">Clear</button>
            <input type="text" id="gi" placeholder="Guess what is drawn">
            <button id="gs">Submit Guess</button>
        </div>
    </div>

    <script>
        let c='#000',b=5,s=0,w='',tl=30,r=1,mr=3,lx,ly,wd=[];
        const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),startButton=document.getElementById('s'),gameContainer=document.getElementById('g'),startContainer=document.getElementById('l'),guessInput=document.getElementById('gi'),submitGuessButton=document.getElementById('gs');
        canvas.width=window.innerWidth*.8,canvas.height=400;

        async function fetchIP(){
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                startButton.innerText=`Start as ${data.ip}`;
                startButton.disabled = false;
                startButton.onclick = () => startGame(data.ip);
            } catch (err) {
                alert('Error fetching IP');
            }
        }

        function startGame(username) {
            startContainer.style.display = 'none';
            gameContainer.style.display = 'block';
            fetch('https://random-word-api.herokuapp.com/word?number=10')
                .then(res => res.json())
                .then(data => { wd = data; nextRound(); });
        }

        function nextRound() {
            if (r > mr) return endGame();
            w = wd[Math.floor(Math.random() * wd.length)];
            tl = 30;
            setTimeout(startTimer, 1000);
        }

        function startTimer() {
            setInterval(() => {
                if (tl <= 0) nextRound();
                document.getElementById('t').innerText = `Time: ${--tl}`;
            }, 1000);
        }

        function endGame() {
            alert(`Game Over! Final Score: ${s}`);
            gameContainer.style.display = 'none';
            startContainer.style.display = 'block';
        }

        submitGuessButton.onclick = () => {
            if (guessInput.value.trim().toLowerCase() === w) {
                s += 10;
                nextRound();
            } else {
                alert('Incorrect!');
            }
        }

        document.getElementById('cp').oninput = e => c = e.target.value;
        document.getElementById('bs').oninput = e => b = e.target.value;
        document.getElementById('cbtn').onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

        canvas.onmousedown = e => { lx = e.offsetX; ly = e.offsetY; };
        canvas.onmousemove = e => {
            if (lx !== undefined && ly !== undefined) {
                ctx.beginPath();
                ctx.moveTo(lx, ly);
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.strokeStyle = c;
                ctx.lineWidth = b;
                ctx.stroke();
                lx = e.offsetX;
                ly = e.offsetY;
            }
        }

        fetchIP();
    </script>
</body>
</html>
