<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Drawing Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="loading" class="menu">
            <h2>Loading your ID...</h2>
            <button id="start" disabled>Start</button>
        </div>

        <div id="game" class="hidden">
            <canvas id="canvas"></canvas>
            <input type="color" id="colorPicker" value="#000">
            <input type="range" id="brushSize" min="1" max="10" value="5">
            <button id="clearButton">Clear</button>
            <input type="text" id="guessInput" placeholder="Guess the drawing">
            <button id="submitGuess">Submit Guess</button>
            <ul id="playerList"></ul>
            <h3 id="timer">Time: 30</h3>
        </div>
    </div>

    <script src="https://cdn.peerjs.com/peerjs.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
