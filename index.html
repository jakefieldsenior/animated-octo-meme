<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Multiplayer Drawing Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="loading" class="menu hidden">
            <h2>Connecting...</h2>
        </div>

        <!-- LOBBY SCREEN -->
        <div id="lobby" class="menu">
            <h1>🎨 Epic Multiplayer Drawing Game 🎨</h1>
            <h2>Join or Host a Game</h2>
            
            <div class="lobby-section">
                <h3>Your Peer ID:</h3>
                <div class="peer-id-box">
                    <code id="playerIdDisplay">Connecting...</code>
                    <button onclick="navigator.clipboard.writeText(document.getElementById('playerIdDisplay').textContent)">📋 Copy</button>
                </div>
            </div>

            <div class="lobby-actions">
                <div class="lobby-action">
                    <h3>🎮 HOST GAME</h3>
                    <label for="difficulty">Select Difficulty:</label>
                    <select id="difficulty">
                        <option value="easy">Easy (5 rounds, 45s each)</option>
                        <option value="normal" selected>Normal (10 rounds, 30s each)</option>
                        <option value="hard">Hard (15 rounds, 20s each)</option>
                    </select>
                    <button id="hostBtn" disabled>Start Hosting</button>
                </div>

                <div class="lobby-action">
                    <h3>👥 JOIN GAME</h3>
                    <input type="text" id="joinPeerIdInput" placeholder="Enter host's Peer ID">
                    <button id="joinBtn" disabled>Join Game</button>
                </div>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game" class="hidden">
            <div class="game-container">
                <!-- LEFT SIDE: GAME -->
                <div class="game-main">
                    <div class="game-header">
                        <div>
                            <h3 id="roundInfo">Get ready!</h3>
                            <h3 id="timer">Time: 30</h3>
                        </div>
                    </div>

                    <canvas id="canvas"></canvas>

                    <div class="drawing-controls">
                        <label>🎨 Color: <input type="color" id="colorPicker" value="#000"></label>
                        <label>📏 Size: <input type="range" id="brushSize" min="1" max="20" value="5"></label>
                        <button id="clearButton">🗑️ Clear</button>
                    </div>

                    <div class="guessing-section">
                        <input type="text" id="guessInput" placeholder="Type your guess...">
                        <button id="submitGuess">Submit Guess</button>
                    </div>

                    <div class="score-display">
                        <h2>Your Score: <span id="score">0</span></h2>
                    </div>
                </div>

                <!-- RIGHT SIDE: LEADERBOARD & CHAT -->
                <div class="game-sidebar">
                    <div class="leaderboard-section">
                        <h3>🏆 Leaderboard</h3>
                        <ul id="leaderboard"></ul>
                    </div>

                    <div class="chat-section">
                        <h3>💬 Chat</h3>
                        <div id="chatFeed" class="chat-feed"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.peerjs.com/peerjs.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
